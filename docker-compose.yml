services:
  postgres:
    image: postgres:16
    container_name: sphone-postgres
    environment:
      POSTGRES_DB: sphone
      POSTGRES_USER: sphone
      POSTGRES_PASSWORD: sphone123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sphone"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sphone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sphone-kafka
    ports:
      - "9092:9092"   # External (host) access
    environment:
      # KRaft mode — no ZooKeeper required
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@sphone-kafka:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://sphone-kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null && echo ok"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  sphone-api:
    build:
      context: ./sphone-api
      dockerfile: Dockerfile
    image: sphone-api:dev
    container_name: sphone-api
    ports:
      - "5154:8080"
    environment:
      DATABASE_URL: "postgresql://sphone:sphone123@sphone-postgres:5432/sphone"
      REDIS_URL: "redis://sphone-redis:6379"
      KAFKA_BROKERS: "sphone-kafka:29092"
      JWT_SECRET: "sphone-super-secret-key-minimum-32-characters!!"
      JWT_EXPIRY_HOURS: "24"
      NODE_ENV: "production"
      PORT: "8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://sphone-otel-collector:4318"
      OTEL_SERVICE_NAME: "sphone-api"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  sphone-app:
    build:
      context: ./sphone-app
      dockerfile: Dockerfile
    image: sphone-app:dev
    container_name: sphone-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Browser-facing URL kept for SSR fallback; browser calls use /api/proxy instead
      NEXT_PUBLIC_API_URL: "http://localhost:5154/api"
      # Used by the server-side proxy route (/api/proxy) to reach sphone-api inside Docker
      INTERNAL_API_URL: "http://sphone-api:8080"
      # Server-side OTel (resolved inside Docker network)
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://sphone-otel-collector:4318"
      OTEL_SERVICE_NAME: "sphone-app"
    depends_on:
      sphone-api:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: sphone-otel-collector
    command: ["--config=/etc/otel/otel-collector.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector self-metrics
      - "8889:8889"   # Prometheus metrics exporter (scraped by Prometheus)
      - "13133:13133" # Health check
    depends_on:
      - tempo
      - loki
    # The collector image is distroless (no shell/wget/curl).
    # It self-restarts on config error; apps tolerate a brief unavailability.
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: sphone-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  tempo:
    image: grafana/tempo:2.7.2
    container_name: sphone-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API
      - "9095:9095"   # Tempo gRPC

  loki:
    image: grafana/loki:3.4.2
    container_name: sphone-loki
    user: "0"
    entrypoint: ["sh", "-c", "mkdir -p /var/loki/rules && exec /usr/bin/loki -config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/var/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.4.2
    container_name: sphone-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceToMetrics
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3333:3000"   # Grafana UI at http://localhost:3333
    depends_on:
      - prometheus
      - tempo
      - loki

  promtail:
    image: grafana/promtail:3.4.2
    container_name: sphone-promtail
    volumes:
      - ./observability/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yaml
    depends_on:
      - loki
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Load generator  (opt-in: docker compose --profile loadtest up locust)
  # ---------------------------------------------------------------------------

  locust:
    image: locustio/locust:2.32.3
    container_name: sphone-locust
    profiles: ["loadtest"]
    volumes:
      - ./sphone-load:/mnt/locust:ro
    command: >
      -f /mnt/locust/locustfile.py
      --host http://sphone-api:8080
      --headless
      --users 1
      --spawn-rate 1
    ports:
      - "8089:8089"   # Locust web UI at http://localhost:8089
    depends_on:
      sphone-api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:
