receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Prometheus self-scrape for collector metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          static_configs:
            - targets: ["127.0.0.1:8888"]

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Add resource attributes to all telemetry
  resource:
    attributes:
      - action: insert
        key: cluster
        value: local

  # Tell the Loki exporter which resource attributes become Loki stream labels.
  # In otelcol-contrib 0.100+, labels are declared via loki.resource.labels hint.
  transform/loki_labels:
    log_statements:
      - context: resource
        statements:
          - set(resource.attributes["loki.resource.labels"], "service.name, deployment.environment, service.namespace, cluster")

exporters:
  # Traces → Grafana Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Metrics → Prometheus (pull model via /metrics endpoint)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: sphone
    const_labels:
      cluster: local

  # Logs → Grafana Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true
      level: true

  # Debug (optional — prints to collector stdout)
  debug:
    verbosity: normal

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, transform/loki_labels, batch]
      exporters: [loki]
