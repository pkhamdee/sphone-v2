global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape metrics exposed by the OTel Collector's Prometheus exporter
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          cluster: local

  # sphone-api metrics come via OTLP push → otel-collector → prometheus exporter at :8889
  # No direct scrape needed for the Next.js API

  # Tempo self-metrics (also receives service graph metrics via remote write from metrics_generator)
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          cluster: local
