global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape metrics exposed by the OTel Collector's Prometheus exporter
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          cluster: local

  # Direct scrape of sphone-api /metrics (ASP.NET Core Prometheus exporter)
  # Useful as a fallback if OTLP pipeline is down
  - job_name: "sphone-api"
    static_configs:
      - targets: ["host.docker.internal:5154"]
        labels:
          service_name: sphone-api
          cluster: local
    metrics_path: /metrics
