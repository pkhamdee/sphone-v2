apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - api-hpa.yaml
  - app-hpa.yaml

namespace: sphone

# --- Image tags for production (use explicit semver, never 'latest') ---
images:
  - name: sphone-api
    newTag: "1.0.0"
  - name: sphone-app
    newTag: "1.0.0"

labels:
  - pairs:
      environment: production
    includeSelectors: false

patches:
  - path: patches/api-deployment.yaml
    target:
      kind: Deployment
      name: sphone-api
  - path: patches/app-deployment.yaml
    target:
      kind: Deployment
      name: sphone-app
  - path: patches/ingress.yaml
    target:
      kind: Ingress
      name: sphone-ingress
  - path: patches/api-configmap.yaml
    target:
      kind: ConfigMap
      name: sphone-api-config
  - path: postgres-pvc-patch.yaml
    target:
      kind: StatefulSet
      name: sphone-postgres

secretGenerator:
  - name: sphone-api-secret
    envs:
      - secret.env
    options:
      disableNameSuffixHash: true
  - name: sphone-postgres-secret
    envs:
      - secret.env
    options:
      disableNameSuffixHash: true
