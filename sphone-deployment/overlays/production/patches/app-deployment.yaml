apiVersion: apps/v1
kind: Deployment
metadata:
  name: sphone-app
  namespace: sphone
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - sphone-app
                topologyKey: kubernetes.io/hostname
      containers:
        - name: sphone-app
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://sphone.example.com/api"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
