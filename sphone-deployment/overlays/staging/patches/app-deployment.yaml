apiVersion: apps/v1
kind: Deployment
metadata:
  name: sphone-app
  namespace: sphone
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: sphone-app
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://staging.sphone.example.com/api"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
