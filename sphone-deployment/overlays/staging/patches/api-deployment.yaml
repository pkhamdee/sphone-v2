apiVersion: apps/v1
kind: Deployment
metadata:
  name: sphone-api
  namespace: sphone
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: sphone-api
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
