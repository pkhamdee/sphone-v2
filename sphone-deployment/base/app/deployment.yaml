apiVersion: apps/v1
kind: Deployment
metadata:
  name: sphone-app
  namespace: sphone
  labels:
    app: sphone-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sphone-app
  template:
    metadata:
      labels:
        app: sphone-app
    spec:
      containers:
        - name: sphone-app
          image: sphone-app:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://sphone-api/api"
            - name: NODE_ENV
              value: "production"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "sphone-app"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
