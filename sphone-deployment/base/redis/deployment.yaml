apiVersion: apps/v1
kind: Deployment
metadata:
  name: sphone-redis
  namespace: sphone
  labels:
    app: sphone-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sphone-redis
  template:
    metadata:
      labels:
        app: sphone-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          emptyDir: {}
