apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sphone-ingress
  namespace: sphone
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: sphone.example.com         # overridden per overlay
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sphone-api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sphone-app
                port:
                  name: http
