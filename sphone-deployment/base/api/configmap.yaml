apiVersion: v1
kind: ConfigMap
metadata:
  name: sphone-api-config
  namespace: sphone
data:
  ASPNETCORE_URLS: "http://+:8080"
  ASPNETCORE_ENVIRONMENT: "Production"
  Kafka__BootstrapServers: "sphone-kafka:9092"
  Jwt__Issuer: "sphone-api"
  Jwt__Audience: "sphone-app"
  Jwt__ExpiryHours: "24"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft__AspNetCore: "Warning"
  OpenTelemetry__Endpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
