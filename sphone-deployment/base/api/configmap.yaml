apiVersion: v1
kind: ConfigMap
metadata:
  name: sphone-api-config
  namespace: sphone
data:
  NODE_ENV: "production"
  KAFKA_BROKERS: "sphone-kafka:9092"
  JWT_ISSUER: "sphone-api"
  JWT_AUDIENCE: "sphone-app"
  JWT_EXPIRY_HOURS: "24"
  OTEL_SERVICE_NAME: "sphone-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318"
  NEXT_TELEMETRY_DISABLED: "1"
