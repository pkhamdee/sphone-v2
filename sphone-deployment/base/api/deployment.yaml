apiVersion: apps/v1
kind: Deployment
metadata:
  name: sphone-api
  namespace: sphone
  labels:
    app: sphone-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sphone-api
  template:
    metadata:
      labels:
        app: sphone-api
    spec:
      containers:
        - name: sphone-api
          image: sphone-api:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: sphone-api-config
            - secretRef:
                name: sphone-api-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
